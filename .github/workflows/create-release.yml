# Create a GitHub Release (and git tag) from main, which triggers "Publish to PyPI"
# on release: published.
#
# Version: defaults to the next PATCH from the latest vMAJOR.MINOR.PATCH on origin.
# Override bump only when you need minor, major, or a custom tag (manual).
#
# Important: we use the repository GitHub App token for `gh release create`, not
# github.token. Events caused by the default GITHUB_TOKEN do not trigger other
# workflows (see GitHub docs: "triggering a workflow from a workflow").
#
# Ensure your GitHub App installation has permission to create releases / write
# contents on this repo (same app as Dependabot auto-merge is fine if it already
# has contents: write).

name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Auto from latest tag on origin (leave as patch for routine releases)"
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - manual
      tag:
        description: "Only when bump is manual — e.g. v0.3.0 or 0.3.0 (ignored otherwise)."
        required: false
        type: string
        default: ""
      confirm:
        description: "Confirm — creates the next release (default: patch bump) and triggers PyPI"
        required: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require confirmation
        if: ${{ inputs.confirm != true }}
        run: |
          echo "Set the Confirm checkbox to true to create this GitHub release and trigger PyPI publish."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        env:
          BUMP: ${{ inputs.bump }}
          RAW_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          bump_semver() {
            local bump="$1" major="$2" minor="$3" patch="$4"
            case "$bump" in
              patch) patch=$((patch + 1)) ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              major) major=$((major + 1)); minor=0; patch=0 ;;
              *) echo "Invalid bump: $bump"; exit 1 ;;
            esac
            echo "v${major}.${minor}.${patch}"
          }

          if [ "$BUMP" = "manual" ]; then
            t="${RAW_TAG#v}"
            if [ -z "$t" ]; then
              echo 'For bump "manual", set the tag input (e.g. v0.3.0).'
              exit 1
            fi
            if ! echo "$t" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Tag must look like v0.2.9 or 0.2.9 (semver only)."
              exit 1
            fi
            TAG="v${t}"
          else
            git fetch --tags --quiet origin || true
            # Latest vMAJOR.MINOR.PATCH on origin (plain semver lines for sort -V)
            latest="$(
              git ls-remote --tags origin |
                awk '{print $2}' |
                sed 's#refs/tags/##' |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                sed 's/^v//' |
                sort -V |
                tail -n1
            )"
            if [ -z "$latest" ]; then
              echo "No prior vMAJOR.MINOR.PATCH tags found on origin. Use bump manual once."
              exit 1
            fi
            major="${latest%%.*}"
            rest="${latest#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            TAG="$(bump_semver "$BUMP" "$major" "$minor" "$patch")"
            echo "Latest release tag on origin: v${latest} → next ($BUMP): ${TAG}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will create release ${TAG}"

      - name: Ensure tag does not already exist
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet origin || true
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag $TAG already exists on origin."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create GitHub Release (triggers Publish to PyPI)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target main \
            --title "Release $TAG" \
            --generate-notes
