# Create a GitHub Release (and git tag) from main, which triggers "Publish to PyPI"
# on release: published.
#
# Version: defaults to the next PATCH from the latest vMAJOR.MINOR.PATCH on origin.
# Override bump only when you need minor, major, or a custom tag (manual).
#
# Important: we use the repository GitHub App token for `gh release create`, not
# github.token. Events caused by the default GITHUB_TOKEN do not trigger other
# workflows (see GitHub docs: "triggering a workflow from a workflow").
#
# Ensure your GitHub App installation has permission to create releases / write
# contents on this repo (same app as Dependabot auto-merge is fine if it already
# has contents: write).
#
# UI notes (GitHub platform — not configurable in this file):
# - "Use workflow from" always appears for workflow_dispatch; it **must** be **main**:
#   the job fails immediately otherwise (so you never run a stale copy of this workflow).
# - All inputs are always visible; there is no conditional "show tag only for manual".
# - To cancel: close the dialog without clicking **Run workflow** (there is no
#   per-workflow Cancel button next to Run workflow).

name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: >-
          Next tag from the latest vA.B.C on origin. patch = +0.0.1, minor = +0.1.0, major = +1.0.0,
          manual = type the tag in Release tag below. Routine releases: patch.
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - manual
      release_tag:
        description: >-
          Leave blank unless bump type is manual. Then enter v0.10.0 or 0.10.0 (MAJOR.MINOR.PATCH only).
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require dispatch from main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo '::error::Set "Use workflow from" to branch main before Run workflow.'
            echo "Current GITHUB_REF=${GITHUB_REF}"
            exit 1
          fi

      - name: Require empty Release tag unless manual bump
        env:
          BUMP: ${{ inputs.bump_type }}
          RAW_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$BUMP" = "manual" ]; then
            exit 0
          fi
          if printf '%s' "$RAW_TAG" | grep -q '[[:graph:]]'; then
            echo '::error::Release tag must be empty when bump type is not manual.'
            echo 'Clear Release tag, or set bump type to manual for a custom tag.'
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        env:
          BUMP: ${{ inputs.bump_type }}
          RAW_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          bump_semver() {
            local bump="$1" major="$2" minor="$3" patch="$4"
            case "$bump" in
              patch) patch=$((patch + 1)) ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              major) major=$((major + 1)); minor=0; patch=0 ;;
              *) echo "Invalid bump: $bump"; exit 1 ;;
            esac
            echo "v${major}.${minor}.${patch}"
          }

          if [ "$BUMP" = "manual" ]; then
            t="${RAW_TAG#v}"
            if [ -z "$t" ]; then
              echo 'For bump type "manual", set the Release tag input (e.g. v0.10.0).'
              exit 1
            fi
            if ! echo "$t" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Tag must look like v0.2.9 or 0.2.9 (semver only)."
              exit 1
            fi
            TAG="v${t}"
          else
            git fetch --tags --quiet origin || true
            # Latest vMAJOR.MINOR.PATCH on origin (plain semver lines for sort -V)
            latest="$(
              git ls-remote --tags origin |
                awk '{print $2}' |
                sed 's#refs/tags/##' |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                sed 's/^v//' |
                sort -V |
                tail -n1
            )"
            if [ -z "$latest" ]; then
              echo "No prior vMAJOR.MINOR.PATCH tags found on origin. Use bump type manual once."
              exit 1
            fi
            major="${latest%%.*}"
            rest="${latest#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            TAG="$(bump_semver "$BUMP" "$major" "$minor" "$patch")"
            echo "Latest release tag on origin: v${latest} → next ($BUMP): ${TAG}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Will create release ${TAG}"

      - name: Ensure tag does not already exist
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet origin || true
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag $TAG already exists on origin."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create GitHub Release (triggers Publish to PyPI)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target main \
            --title "Release $TAG" \
            --generate-notes
