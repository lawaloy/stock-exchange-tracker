# Call only from workflows that use `pull_request` (not `pull_request_target`) and
# restrict to same-repo PRs so checkout runs in a standard PR context.

name: PR Auto Prepare Reusable

on:
  workflow_call:
    inputs:
      lane:
        required: true
        type: string
      pull_number:
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Inspect PR metadata
        id: pr
        uses: actions/github-script@v7
        env:
          LANE: ${{ inputs.lane }}
          PULL_NUMBER: ${{ inputs.pull_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const lane = process.env.LANE;
            const pull_number = Number(process.env.PULL_NUMBER);
            const { owner, repo } = context.repo;
            const pr = (
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              })
            ).data;
            const labels = pr.labels.map((label) => label.name);

            const isTrustedDependabot = () => {
              const authorLogin = pr.user?.login || '';
              const headRef = pr.head?.ref || '';
              return (
                ['dependabot[bot]', 'app/dependabot'].includes(authorLogin) &&
                headRef.startsWith('dependabot/')
              );
            };

            const isTrustedMaintenance = () => {
              const authorLogin = pr.user?.login || '';
              return (
                pr.head.repo?.full_name === `${owner}/${repo}` &&
                pr.base.ref === 'main' &&
                pr.head.ref === 'security/deps-maintenance' &&
                ['app/github-actions', 'github-actions[bot]', 'market-helm[bot]', 'app/market-helm'].includes(authorLogin) &&
                labels.includes('dependencies') &&
                labels.includes('security')
              );
            };

            const trusted = lane === 'dependabot' ? isTrustedDependabot() : isTrustedMaintenance();
            const files = trusted
              ? await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number,
                  per_page: 100,
                })
              : [];
            const npmWorkspaces = ['dashboard/frontend'];
            const changedWorkspaces = npmWorkspaces.filter((workspace) =>
              files.some((file) =>
                file.filename === `${workspace}/package.json` ||
                file.filename === `${workspace}/package-lock.json`,
              ),
            );

            core.setOutput('trusted', trusted ? 'true' : 'false');
            core.setOutput('blocked', labels.includes('automerge-blocked') ? 'true' : 'false');
            core.setOutput('changed-workspaces', JSON.stringify(changedWorkspaces));

      - name: Checkout PR branch
        if: steps.pr.outputs.trusted == 'true' && steps.pr.outputs.changed-workspaces != '[]'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node
        if: steps.pr.outputs.trusted == 'true' && steps.pr.outputs.changed-workspaces != '[]'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync lockfile with package.json (matches npm ci)
        if: steps.pr.outputs.trusted == 'true' && steps.pr.outputs.changed-workspaces != '[]'
        env:
          CHANGED_WORKSPACES: ${{ steps.pr.outputs.changed-workspaces }}
        run: |
          node -e "const workspaces = JSON.parse(process.env.CHANGED_WORKSPACES); if (!Array.isArray(workspaces) || workspaces.length === 0) process.exit(0);"
          for workspace in $(node -pe "JSON.parse(process.env.CHANGED_WORKSPACES).join(' ')"); do
            (cd "$workspace" && npm install --ignore-scripts)
          done

      - name: Commit lockfile updates
        if: steps.pr.outputs.trusted == 'true' && steps.pr.outputs.changed-workspaces != '[]'
        env:
          CHANGED_WORKSPACES: ${{ steps.pr.outputs.changed-workspaces }}
        run: |
          git config user.name "market-helm[bot]"
          git config user.email "market-helm[bot]@users.noreply.github.com"

          for workspace in $(node -pe "JSON.parse(process.env.CHANGED_WORKSPACES).join(' ')"); do
            git add "$workspace/package-lock.json" "$workspace/package.json"
          done

          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
            exit 0
          fi

          git commit \
            --author="lawaloy <40930161+lawaloy@users.noreply.github.com>" \
            -m "chore: normalize npm lockfiles"
          git push

      - name: Prepare PR for automation
        if: steps.pr.outputs.trusted == 'true'
        uses: actions/github-script@v7
        env:
          PULL_NUMBER: ${{ inputs.pull_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pull_number = Number(process.env.PULL_NUMBER);
            const { owner, repo } = context.repo;
            const pr = (
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              })
            ).data;
            const labels = pr.labels.map((label) => label.name);
            const blocked = labels.includes('automerge-blocked');

            if (blocked) {
              const body = 'Auto-merge skipped because the `automerge-blocked` label is present.';
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100,
              });

              if (comments.some((comment) => comment.body === body)) {
                core.info('Skipping blocked comment because the same comment already exists.');
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
              return;
            }

            core.info('Skipping bot approval review; auto-merge is driven by successful checks.');
