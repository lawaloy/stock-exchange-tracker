name: Dependency Maintenance Auto Prepare

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/pr-auto-prepare-reusable.yml
    with:
      lane: maintenance
      pull_number: ${{ github.event.pull_request.number }}
    secrets: inherit
