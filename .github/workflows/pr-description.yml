name: PR Description

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR description
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin $BASE_REF

          # Gather changed files and statuses
          FILE_STATUS=$(git diff --name-status origin/$BASE_REF...HEAD)
          FILE_LIST=$(echo "$FILE_STATUS" | awk '
            $1 ~ /^R/ { print $3; next }
            NF >= 2 { print $2 }
          ')

          # Files changed (bullet list)
          FILES=$(echo "$FILE_LIST" | sed '/^$/d' | sed 's/^/- `/' | sed 's/$/`/')
          [ -z "$FILES" ] && FILES="- (no files changed)"

          # Scalable summary: counts by change type and top-level area
          TOTAL_CHANGED=$(echo "$FILE_LIST" | sed '/^$/d' | wc -l | tr -d ' ')
          ADDED=$(echo "$FILE_STATUS" | grep -Ec '^A[[:space:]]' || true)
          MODIFIED=$(echo "$FILE_STATUS" | grep -Ec '^M[[:space:]]' || true)
          DELETED=$(echo "$FILE_STATUS" | grep -Ec '^D[[:space:]]' || true)
          RENAMED=$(echo "$FILE_STATUS" | grep -Ec '^R[0-9]*[[:space:]]' || true)

          AREA_COUNTS=$(echo "$FILE_LIST" | sed '/^$/d' | awk -F/ '
            {
              area = (NF == 1) ? "root" : $1
              count[area]++
            }
            END {
              for (a in count) {
                printf "- %s: %d files\n", a, count[a]
              }
            }
          ' | sort)

          if [ -z "$AREA_COUNTS" ]; then
            AREA_COUNTS="- none"
          fi

          {
            echo "## Auto"
            echo ""
            echo "- ${TOTAL_CHANGED} files changed."
            echo "- ${ADDED} added, ${MODIFIED} modified, ${RENAMED} renamed, ${DELETED} deleted."
            echo ""
            echo "## Areas"
            echo ""
            echo "$AREA_COUNTS"
            echo ""
            echo "## Files changed"
            echo ""
            echo "$FILES"
          } > pr-auto.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MAX_LENGTH = 1000;
            const TRUNCATE_SUFFIX = '\n\n...';
            const START = '<!-- AUTO:START -->';
            const END = '<!-- AUTO:END -->';

            let autoBody = fs.readFileSync('pr-auto.md', 'utf8');

            if (autoBody.length > MAX_LENGTH) {
              // Keep whole lines; never cut file paths mid-line.
              const lines = autoBody.split('\n');
              let out = '';
              for (const line of lines) {
                const candidate = out ? `${out}\n${line}` : line;
                if (candidate.length + TRUNCATE_SUFFIX.length > MAX_LENGTH) break;
                out = candidate;
              }
              autoBody = out + TRUNCATE_SUFFIX;
            }
            const autoSection = `${START}\n${autoBody}\n${END}`;

            const existing = context.payload.pull_request.body || '';
            let body;
            const startIdx = existing.indexOf(START);
            const endIdx = existing.indexOf(END);

            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              const before = existing.slice(0, startIdx).trimEnd();
              const after = existing.slice(endIdx + END.length).trimStart();
              body = `${before}\n\n${autoSection}${after ? `\n\n${after}` : ''}`;
            } else {
              body = `## What + Why\n- \n\n## Checks\n- [ ] \`dashboard/frontend\`: \`npm ci\` and \`npm run build\`\n- [ ] \`pytest tests/\` (repo root)\n\n${autoSection}`;
            }

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body
            });
