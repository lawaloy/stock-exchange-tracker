# After "Publish to PyPI" succeeds for a GitHub Release, open a PR to align main
# (setup.cfg, version_sync targets, CHANGELOG stub). Separate from publish.yml so
# Publish only ships artifacts; this workflow runs when that workflow completes.
#
# Same auth pattern as deps-maintenance.yml: app token first, then checkout with
# that token so git push uses the installation (not GITHUB_TOKEN / github-actions[bot]).

name: Post-release sync to main

on:
  workflow_run:
    # Must match the `name:` at the top of publish.yml ("Publish to PyPI"), not the filename.
    # See GitHub docs: workflow_run `workflows` lists workflow names, not paths.
    # Do not use `branches:` here: release-triggered runs use head_branch like `v0.2.12`, not `main`.
    workflows:
      - Publish to PyPI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  sync_repo_version:
    name: Post-release version sync PR
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Download release tag from Publish workflow
        uses: actions/download-artifact@v4
        with:
          name: post-release-tag
          path: .post-release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to latest origin/main before applying release
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply released version and sync tracked files
        id: align
        run: |
          set -euo pipefail
          TAG="$(tr -d '[:space:]' < .post-release/tag.txt)"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Unexpected tag in artifact (want vMAJOR.MINOR.PATCH): $TAG"
            exit 1
          fi
          export TAG
          python - <<'PY'
          import configparser, os, re, sys

          tag = os.environ["TAG"]
          version = tag.lstrip("v")
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              print("Invalid version from tag", tag, file=sys.stderr)
              sys.exit(1)

          cfg = configparser.ConfigParser()
          cfg.read("setup.cfg", encoding="utf-8")
          cfg["metadata"]["version"] = version
          with open("setup.cfg", "w", encoding="utf-8") as f:
              cfg.write(f)
          print("Version set to", version, "from tag", tag)
          PY
          python scripts/version_sync.py sync
          python scripts/version_sync.py check
          VERSION="${TAG#v}"
          python scripts/post_release_changelog.py \
            --version "$VERSION" \
            --date "$(date -u +%Y-%m-%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git diff --quiet HEAD; then
            echo "Working tree matches $(git rev-parse HEAD); no PR needed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request to main
        if: steps.align.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.align.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BRANCH="chore/post-release-sync-${VERSION}"
          echo "HEAD before branch ($(git rev-parse --short HEAD)) should match origin/main ($(git rev-parse --short origin/main))."
          git fetch origin "$BRANCH" 2>/dev/null || true
          # HEAD is latest origin/main (see "Sync to latest origin/main"); branch carries one commit on top.
          git checkout -B "$BRANCH"
          git config user.name "market-helm[bot]"
          git config user.email "market-helm[bot]@users.noreply.github.com"
          git add setup.cfg dashboard/frontend/package.json dashboard/frontend/package-lock.json dashboard/backend/main.py CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No staged changes; exiting."
            exit 0
          fi
          echo "Staged changes for post-release sync:"
          git diff --cached --stat
          git commit \
            --author="lawaloy <40930161+lawaloy@users.noreply.github.com>" \
            -m "chore: sync repo version and changelog for ${VERSION} (post-release ${TAG})"
          git push -u origin "$BRANCH" --force-with-lease
          if [ "$(gh pr list --base main --head "$BRANCH" --state open --json number --jq length)" -eq 0 ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore: sync repo version to ${VERSION} (${TAG})" \
              --body "Automated PR after **${TAG}** was published to PyPI. Updates \`setup.cfg\` and synced files (\`scripts/version_sync.py\`), and adds a **[\`${VERSION}\`]** entry to \`CHANGELOG.md\` when one is not already present (\`scripts/post_release_changelog.py\`). Triggered after **Publish to PyPI** completes successfully. If you retried with a different tag, merge the PR that matches the version on PyPI; edit the new changelog section for user-facing notes if needed."
          else
            echo "Open PR already exists for ${BRANCH}; branch updated."
          fi
